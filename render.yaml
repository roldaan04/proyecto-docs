services:
  - type: web
    name: control-admin-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y tesseract-ocr tesseract-ocr-spa poppler-utils && pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://pmkdtqrjgzstrirxqzea.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 300
      - key: ALGORITHM
        value: HS256
      - key: API_V1_STR
        value: /api/v1
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: static
    name: control-admin
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist/frontend/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
