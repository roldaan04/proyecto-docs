<div
  class="w-full max-w-[24rem] rounded-[3rem] shadow-xl
  sm:max-w-[30rem] sm:rounded-[3rem] px-8 py-8
  lg:flex lg:min-h-[40rem] lg:w-[42rem] lg:max-w-none lg:flex-col lg:justify-between lg:rounded-[2.25rem] lg:px-12 lg:py-12"
>
  <div>
    <div class="mb-7 text-center sm:mb-9">
      <div
        class="mx-auto mb-4 inline-flex h-14 w-14 items-center justify-center rounded-[2.5rem] sm:h-20 sm:w-20 lg:h-20 lg:w-20 lg:rounded-3xl"
        style="background-color: var(--primary-color);"
      >
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-7 w-7 text-white sm:h-8 sm:w-8 lg:h-10 lg:w-10"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M18 9v6m-3-3h6M8 7h4m-4 4h8m-8 4h5M7 3h10a2 2 0 012 2v14a2 2 0 01-2 2H7a2 2 0 01-2-2V5a2 2 0 012-2z"/>
        </svg>
      </div>

      <h1 class="text-2xl font-semibold leading-tight sm:text-3xl lg:text-[2.4rem]"
          style="color: var(--text-color);">
        Crear cuenta
      </h1>

      <p class="mt-2 text-sm leading-relaxed sm:mt-3 sm:text-base lg:text-lg"
         style="color: var(--dark-gray-color);">
        Empieza a gestionar tus documentos financieros
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6 lg:space-y-7">
      <div class="grid grid-cols-1 gap-5 md:grid-cols-2 lg:gap-6">
        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium"
                 style="color: var(--text-color);">
            Nombre de empresa
          </label>
          <input class="form-input-rounded w-full lg:min-h-[3.6rem]"
                 type="text"
                 formControlName="company_name"
                 placeholder="Nombre de empresa"
                 autocomplete="organization"/>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium"
                 style="color: var(--text-color);">
            Nombre completo
          </label>
          <input class="form-input-rounded w-full lg:min-h-[3.6rem]"
                 type="text"
                 formControlName="full_name"
                 placeholder="Nombre completo"
                 autocomplete="name"/>
        </div>

        <div>
          <label class="mb-2 block text-sm font-medium"
                 style="color: var(--text-color);">
            Email
          </label>
          <input class="form-input-rounded w-full lg:min-h-[3.6rem]"
                 type="email"
                 formControlName="email"
                 placeholder="tu@email.com"
                 autocomplete="email"/>
        </div>

        <div class="md:col-span-2">
          <label class="mb-2 block text-sm font-medium"
                 style="color: var(--text-color);">
            Contraseña
          </label>
          <input class="form-input-rounded w-full no-eye-password lg:min-h-[3.6rem]"
                 type="password"
                 formControlName="password"
                 placeholder="••••••••"
                 autocomplete="new-password"/>
        </div>
      </div>

      @if (error()) {
        <div
          class="flex items-start gap-2 rounded-xl border px-4 py-3 text-sm leading-relaxed lg:text-base"
          style="border-color: var(--error-color); background-color: #fff5f5; color: var(--error-color);">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="mt-0.5 h-4 w-4 shrink-0"
               fill="none"
               viewBox="0 0 24 24"
               stroke="currentColor"
               stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
          <span class="break-words">{{ error() }}</span>
        </div>
      }

      <button
        type="submit"
        class="w-full rounded-full px-8 py-4
        disabled:cursor-not-allowed disabled:opacity-60
        sm:py-3.5 sm:text-base
        lg:min-h-[4rem] lg:rounded-2xl lg:text-lg"
        style="background-color: var(--primary-color); color: var(--text-opposite-color);"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="h-4 w-4 animate-spin"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10"
                      stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75"
                    fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Creando cuenta...
          </span>
        } @else {
          Registrarme
        }
      </button>
    </form>
  </div>

  <p class="mt-6 text-center text-sm leading-relaxed sm:mt-8 lg:text-base"
     style="color: var(--dark-gray-color);">
    ¿Ya tienes cuenta?
    <a routerLink="/auth/login"
       class="ml-1 font-semibold"
       style="color: var(--primary-color);">
      Inicia sesión
    </a>
  </p>
</div>
