<div
  class="w-full max-w-[22rem] rounded-[3rem] shadow-xl
  sm:max-w-[26rem] sm:rounded-[3rem] px-8 py-8
  lg:flex lg:min-h-[36rem] lg:w-[36rem] lg:max-w-none lg:flex-col lg:justify-between lg:rounded-[2.25rem] lg:px-10 lg:py-10
  xl:min-h-[38rem] xl:w-[38rem]
  2xl:min-h-[40rem] 2xl:w-[40rem]"
>
  <div>
    <div class="mb-7 text-center sm:mb-8 lg:mb-10">
      <div
        class="mx-auto mb-4 inline-flex h-14 w-14 items-center justify-center rounded-[2.5rem] sm:h-20 sm:w-20 lg:mb-6 lg:h-20 lg:w-20 lg:rounded-3xl"
        style="background-color: var(--primary-color);"
      >
        <svg xmlns="http://www.w3.org/2000/svg"
             class="h-7 w-7 text-white sm:h-8 sm:w-8 lg:h-10 lg:w-10"
             fill="none"
             viewBox="0 0 24 24"
             stroke="currentColor"
             stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
      </div>

      <h1 class="text-[1.9rem] font-semibold leading-tight sm:text-4xl lg:text-[2.6rem]"
          style="color: var(--text-color);">
        Iniciar sesión
      </h1>

      <p class="mx-auto mt-2 max-w-[28rem] text-sm leading-relaxed sm:mt-3 sm:text-base lg:mt-4 lg:text-lg"
         style="color: var(--dark-gray-color);">
        Accede a tu panel documental
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5 sm:space-y-6 lg:space-y-7">

      <div class="space-y-2 lg:space-y-3">
        <label class="block text-sm font-medium lg:text-base"
               style="color: var(--text-color);">
          Email
        </label>

        <input
          class="form-input-rounded w-full text-sm sm:text-base lg:min-h-[3.8rem] lg:text-lg"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="space-y-2 lg:space-y-3">
        <label class="block text-sm font-medium lg:text-base"
               style="color: var(--text-color);">
          Contraseña
        </label>

        <input
          class="form-input-rounded no-eye-password w-full text-sm sm:text-base lg:min-h-[3.8rem] lg:text-lg"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      @if (error()) {
        <div
          class="flex items-start gap-2 rounded-xl border px-4 py-3 text-sm leading-relaxed lg:rounded-2xl lg:px-5 lg:py-4 lg:text-base"
          style="border-color: var(--error-color); background-color: #fff5f5; color: var(--error-color);">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="mt-0.5 h-4 w-4 shrink-0 lg:h-5 lg:w-5"
               fill="none"
               viewBox="0 0 24 24"
               stroke="currentColor"
               stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
          <span class="break-words">{{ error() }}</span>
        </div>
      }

      <button
        type="submit"
        class="w-full rounded-full px-8 py-4 text-sm font-semibold transition-all duration-200 hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60
        sm:py-3.5 sm:text-base
        lg:min-h-[4rem] lg:rounded-2xl lg:text-lg"
        style="background-color: var(--primary-color); color: var(--text-opposite-color);"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="h-4 w-4 animate-spin lg:h-5 lg:w-5"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10"
                      stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Entrando...
          </span>
        } @else {
          Entrar
        }
      </button>

    </form>
  </div>

  <p class="mt-6 text-center text-sm leading-relaxed sm:mt-8 lg:mt-10 lg:text-base"
     style="color: var(--dark-gray-color);">
    ¿No tienes cuenta?
    <a routerLink="/auth/register"
       class="ml-1 font-semibold"
       style="color: var(--primary-color);">
      Regístrate
    </a>
  </p>
</div>
