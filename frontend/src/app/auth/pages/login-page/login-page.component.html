<div
  class="w-full max-w-[22rem] rounded-[3rem] shadow-xl
  sm:max-w-[26rem] sm:rounded-[3rem] px-8 py-8
  lg:flex lg:min-h-[36rem] lg:w-[36rem] lg:max-w-none lg:flex-col lg:justify-between lg:rounded-[2.25rem] lg:px-10 lg:py-10
  xl:min-h-[38rem] xl:w-[38rem]
  2xl:min-h-[40rem] 2xl:w-[40rem]"
>
  <div>
    <div class="mb-7 text-center sm:mb-8 lg:mb-10">
      <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-[2.5rem] bg-white shadow-md sm:h-24 sm:w-24 lg:mb-6 lg:h-28 lg:w-28 lg:rounded-[2.5rem]">
        <img src="logo_tuadmin.png" alt="TuAdministrativo" class="h-10 w-10 sm:h-16 sm:w-16 lg:h-20 lg:w-20 rounded-2xl object-contain" />
      </div>

      <h1 class="text-[1.9rem] font-semibold leading-tight sm:text-4xl lg:text-[2.6rem]"
          style="color: var(--text-color);">
        Iniciar sesión
      </h1>

      <p class="mx-auto mt-2 max-w-[28rem] text-sm leading-relaxed sm:mt-3 sm:text-base lg:mt-4 lg:text-lg"
         style="color: var(--dark-gray-color);">
        Accede a tu panel documental
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5 sm:space-y-6 lg:space-y-7">

      <div class="space-y-2 lg:space-y-3">
        <label class="block text-sm font-medium lg:text-base"
               style="color: var(--text-color);">
          Email
        </label>

        <input
          class="form-input-rounded w-full text-sm sm:text-base lg:min-h-[3.8rem] lg:text-lg"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="space-y-2 lg:space-y-3">
        <label class="block text-sm font-medium lg:text-base"
               style="color: var(--text-color);">
          Contraseña
        </label>

        <div class="relative">
          <input
            class="form-input-rounded no-eye-password w-full pr-12 text-sm sm:text-base lg:min-h-[3.8rem] lg:text-lg"
            [type]="showPassword() ? 'text' : 'password'"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            (click)="showPassword.set(!showPassword())"
            class="absolute inset-y-0 right-4 flex items-center text-gray-400 hover:text-gray-600"
            [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            @if (showPassword()) {
              <!-- ojo tachado -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-5 0-9-4-9-7a9.77 9.77 0 012.197-3.618M6.53 6.53A9.77 9.77 0 0112 5c5 0 9 4 9 7a9.77 9.77 0 01-1.504 2.773M3 3l18 18" />
              </svg>
            } @else {
              <!-- ojo abierto -->
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
              </svg>
            }
          </button>
        </div>
      </div>

      @if (error()) {
        <div
          class="flex items-start gap-2 rounded-xl border px-4 py-3 text-sm leading-relaxed lg:rounded-2xl lg:px-5 lg:py-4 lg:text-base"
          style="border-color: var(--error-color); background-color: #fff5f5; color: var(--error-color);">
          <svg xmlns="http://www.w3.org/2000/svg"
               class="mt-0.5 h-4 w-4 shrink-0 lg:h-5 lg:w-5"
               fill="none"
               viewBox="0 0 24 24"
               stroke="currentColor"
               stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          </svg>
          <span class="break-words">{{ error() }}</span>
        </div>
      }

      <button
        type="submit"
        class="w-full rounded-full px-8 py-4 text-sm font-semibold transition-all duration-200 hover:opacity-90 disabled:cursor-not-allowed disabled:opacity-60
        sm:py-3.5 sm:text-base
        lg:min-h-[4rem] lg:rounded-2xl lg:text-lg"
        style="background-color: var(--primary-color); color: var(--text-opposite-color);"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="h-4 w-4 animate-spin lg:h-5 lg:w-5"
                 xmlns="http://www.w3.org/2000/svg"
                 fill="none"
                 viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10"
                      stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Entrando...
          </span>
        } @else {
          Entrar
        }
      </button>

    </form>
  </div>

  <div class="mt-6 flex flex-col items-center gap-2 sm:mt-8 lg:mt-10">
    <a
      routerLink="/auth/forgot-password"
      class="text-sm leading-relaxed"
      style="color: var(--dark-gray-color);"
    >
      ¿Olvidaste tu contraseña?
    </a>
    <p class="text-center text-sm leading-relaxed" style="color: var(--dark-gray-color);">
      ¿No tienes cuenta?
      <a routerLink="/auth/register" class="ml-1 font-semibold" style="color: var(--primary-color);">
        Regístrate
      </a>
    </p>
  </div>
</div>
